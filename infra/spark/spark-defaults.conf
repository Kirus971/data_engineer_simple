spark.sql.catalog.hadoop_cat org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.hadoop_cat.type hadoop
spark.sql.catalog.hadoop_cat.warehouse s3a://${S3_BUCKET}/warehouse

spark.sql.catalog.hms_cat org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.hms_cat.type hive
spark.sql.catalog.hms_cat.uri thrift://hive-metastore:9083
spark.sql.catalog.hms_cat.warehouse s3a://${S3_BUCKET}/warehouse

spark.sql.extensions org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

spark.hadoop.fs.s3a.endpoint ${S3_ENDPOINT}
spark.hadoop.fs.s3a.path.style.access true
spark.hadoop.fs.s3a.connection.ssl.enabled false
spark.hadoop.fs.s3a.aws.credentials.provider org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
spark.hadoop.fs.s3a.access.key ${S3_ACCESS_KEY}
spark.hadoop.fs.s3a.secret.key ${S3_SECRET_KEY}

spark.jars.ivy /tmp/.ivy2
spark.sql.shuffle.partitions 4
spark.default.parallelism 4

