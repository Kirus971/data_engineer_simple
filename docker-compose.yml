name: senior-de-platform

services:
  # ---------- Shared DBs ----------
  postgres-airflow:
    image: postgres:16
    environment:
      POSTGRES_USER: ${AIRFLOW_DB_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pg_airflow:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_DB_USER} -d ${AIRFLOW_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 20

  postgres-hms:
    image: postgres:16
    environment:
      POSTGRES_USER: ${HMS_DB_USER}
      POSTGRES_PASSWORD: ${HMS_DB_PASSWORD}
      POSTGRES_DB: ${HMS_DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - pg_hms:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${HMS_DB_USER} -d ${HMS_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ---------- MinIO (S3) ----------
  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 30

  minio-init:
    image: minio/mc:RELEASE.2025-01-17T10-29-17Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-lc"]
    command: >
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
      mc mb -p local/${S3_BUCKET} || true &&
      mc anonymous set download local/${S3_BUCKET} || true

  # ---------- Kafka ----------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      - kafka
    ports:
      - "8082:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - kafka
    entrypoint: ["/bin/bash", "-lc"]
    command: >
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists
      --topic ${KAFKA_TOPIC_CUSTOMER_CDC} --partitions 1 --replication-factor 1

  # ---------- Hive Metastore (HMS) ----------
  hive-metastore:
    image: apache/hive:4.0.0
    depends_on:
      postgres-hms:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "9083:9083"
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      SERVICE_OPTS: >
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres-hms:5432/${HMS_DB_NAME}
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionUserName=${HMS_DB_USER}
        -Djavax.jdo.option.ConnectionPassword=${HMS_DB_PASSWORD}
        -Dhive.metastore.uris=thrift://0.0.0.0:9083
        -Dhive.metastore.warehouse.dir=s3a://${S3_BUCKET}/warehouse
        -Dhive.metastore.warehouse.external.dir=s3a://${S3_BUCKET}/warehouse_external
        -Dhive.metastore.schema.verification=false
        -Dhive.metastore.event.db.notification.api.auth=false
        -Dfs.s3a.endpoint=${S3_ENDPOINT}
        -Dfs.s3a.path.style.access=true
        -Dfs.s3a.connection.ssl.enabled=false
        -Dfs.s3a.aws.credentials.provider=org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
        -Dfs.s3a.access.key=${S3_ACCESS_KEY}
        -Dfs.s3a.secret.key=${S3_SECRET_KEY}
    # NOTE: The apache/hive image typically includes JDBC drivers; if your environment
    # lacks the Postgres driver, add a volume with the jar into /opt/hive/lib/.

  # ---------- Spark ----------
  spark:
    image: bitnami/spark:3.5.1
    depends_on:
      - kafka
      - hive-metastore
      - minio
    environment:
      SPARK_MODE: master
    ports:
      - "7077:7077"
      - "8081:8080"
    volumes:
      - ./spark:/opt/spark-apps
      - ./infra/spark/spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf:ro
      - ./infra/spark/jars:/opt/bitnami/spark/extra-jars

  # ---------- ClickHouse ----------
  clickhouse:
    image: clickhouse/clickhouse-server:25.2
    ports:
      - "8123:8123"
      - "9009:9000"
    volumes:
      - ch_data:/var/lib/clickhouse
      - ./infra/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  # ---------- DE Tools (producer/loader) ----------
  de-tools:
    image: python:3.11-slim
    depends_on:
      - kafka
      - clickhouse
      - minio
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      KAFKA_BROKERS: ${KAFKA_BROKERS}
      KAFKA_TOPIC_CUSTOMER_CDC: ${KAFKA_TOPIC_CUSTOMER_CDC}
      CLICKHOUSE_HOST: ${CLICKHOUSE_HOST}
      CLICKHOUSE_HTTP_PORT: ${CLICKHOUSE_HTTP_PORT}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE}
    command: >
      bash -lc "pip install -q --no-cache-dir confluent-kafka clickhouse-connect boto3 && sleep infinity"

  # ---------- Airflow ----------
  airflow-webserver:
    image: apache/airflow:2.10.3
    depends_on:
      postgres-airflow:
        condition: service_healthy
      kafka:
        condition: service_started
      minio:
        condition: service_healthy
      spark:
        condition: service_started
      clickhouse:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres-airflow:5432/${AIRFLOW_DB_NAME}
      AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES}
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      _PIP_ADDITIONAL_REQUIREMENTS: >-
        apache-airflow-providers-apache-spark
        apache-airflow-providers-apache-kafka
        apache-airflow-providers-amazon
        clickhouse-connect
        confluent-kafka
        boto3
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/logs:/opt/airflow/logs
      - ./scripts:/opt/airflow/project-scripts:ro
    command: >
      bash -lc "
      airflow db migrate &&
      airflow users create
        --username ${AIRFLOW_ADMIN_USER}
        --password ${AIRFLOW_ADMIN_PASSWORD}
        --firstname Admin
        --lastname User
        --role Admin
        --email admin@example.com || true &&
      airflow webserver
      "

  airflow-scheduler:
    image: apache/airflow:2.10.3
    depends_on:
      airflow-webserver:
        condition: service_started
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres-airflow:5432/${AIRFLOW_DB_NAME}
      AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES}
      _PIP_ADDITIONAL_REQUIREMENTS: >-
        apache-airflow-providers-apache-spark
        apache-airflow-providers-apache-kafka
        apache-airflow-providers-amazon
        clickhouse-connect
        confluent-kafka
        boto3
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/logs:/opt/airflow/logs
      - ./scripts:/opt/airflow/project-scripts:ro
    command: >
      bash -lc "airflow scheduler"

volumes:
  pg_airflow:
  pg_hms:
  minio_data:
  ch_data:

